# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check
# Run specific check: cargo deny check advisories

[graph]
targets = []
all-features = true

# ── Advisories ────────────────────────────────────────────────────────────────
# Checks crates against the RustSec advisory database.
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail on any vulnerability
vulnerability = "deny"
# Warn on unmaintained crates
unmaintained = "warn"
# Warn on crates that have been yanked
yanked = "warn"
notice = "warn"
# To ignore specific advisories, add their IDs here:
# ignore = [
#     "RUSTSEC-2024-XXXX",  # reason for ignoring
# ]

# ── Licenses ──────────────────────────────────────────────────────────────────
# Controls which licenses are allowed in the dependency graph.
[licenses]
unlicensed = "deny"
copyleft = "deny"
# Confidence threshold for license detection
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "BSL-1.0",       # Boost
    "CC0-1.0",       # Creative Commons Zero
    "MPL-2.0",       # Mozilla Public License (weak copyleft, generally compatible)
]
# To add per-crate license exceptions:
# [[licenses.exceptions]]
# name = "some-crate"
# allow = ["LGPL-3.0"]  # reason: used only as dynamic library

[licenses.private]
# If you have private crates, list registries here
ignore = false
registries = []

# ── Bans ──────────────────────────────────────────────────────────────────────
# Controls which crates are allowed or denied.
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Deny specific crates known to be problematic:
# deny = [
#     { crate = "openssl-sys", reason = "use rustls instead" },
# ]
# Allow duplicate versions for specific crates:
# skip = [
#     { crate = "bitflags@1.3.2", reason = "transitive dep not yet updated" },
# ]

# ── Sources ───────────────────────────────────────────────────────────────────
# Controls where crates can be fetched from.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
