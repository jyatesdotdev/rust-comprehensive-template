# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check
# Run specific check: cargo deny check advisories

[graph]
targets = []
all-features = true

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
ignore = [
    # number_prefix is unmaintained but only used transitively via indicatif.
    # No security impact; will be replaced when indicatif updates.
    { id = "RUSTSEC-2025-0119", reason = "unmaintained, transitive via indicatif, no security impact" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "BSL-1.0",       # Boost
    "CC0-1.0",       # Creative Commons Zero
    "MPL-2.0",       # Mozilla Public License (weak copyleft, generally compatible)
]

[licenses.private]
ignore = false
registries = []

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
